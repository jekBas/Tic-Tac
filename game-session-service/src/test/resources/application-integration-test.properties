# Profile activated by integration tests via @ActiveProfiles("integration-test").
# game-engine.base-url is overridden dynamically by BaseSessionIntegrationTest
# once the in-process WireMock server has bound to a port.

spring.jackson.property-naming-strategy=com.fasterxml.jackson.databind.PropertyNamingStrategies$KebabCaseStrategy

game-engine.base-url=http://overridden-by-dynamic-property-source
game-engine.connect-timeout=2s
game-engine.read-timeout=5s

# Default to zero move delay; concurrency tests slow the engine instead so the
# session service keeps the in-flight simulation lock long enough.
session.simulation.move-delay=0ms

logging.level.com.example.tictac.session=INFO
